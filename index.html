<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OuiSi — The Visual Connection Game</title>
  <meta name="description" content="OuiSi is a photo game of visual connections. Play with the people you love.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0ebe1;
      color: #454545;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px 24px;
    }
    .mark {
      width: 96px; height: 96px;
      background: #f7941e;
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 28px;
      box-shadow: 0 8px 24px rgba(0,0,0,.12);
    }
    .mark svg { width: 64px; height: 64px; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 12px; }
    p  { font-size: 17px; line-height: 1.5; color: #6b6b6b; max-width: 420px; margin-bottom: 28px; }
    a.btn {
      display: inline-block;
      background: #454545; color: #fff;
      text-decoration: none;
      font-size: 16px; font-weight: 600;
      padding: 14px 32px; border-radius: 14px;
    }
    .foot { margin-top: 48px; font-size: 13px; color: #a5a09a; }
    .foot a { color: #a5a09a; }
  </style>
</head>
<body>
  <div class="mark">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="48" r="32" fill="none" stroke="#fff" stroke-width="7"/>
      <circle cx="40" cy="60" r="17" fill="#fff"/>
    </svg>
  </div>
  <h1>OuiSi</h1>
  <p>The visual connection game. Take photos, find the links between them, and talk about what you see — together.</p>
  <a class="btn" href="https://shop.ouisi.co">Get the card game</a>
  <div class="foot">iPhone app in beta &middot; <a href="https://shop.ouisi.co">shop.ouisi.co</a></div>
</body>
</html>
